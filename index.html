<!DOCTYPE html>
<html>
<head>
  <title>Song Reviews</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("https://www.aiu.edu/wp-content/uploads/2022/09/music-1-1.jpg") no-repeat center center/cover;
      color: white;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #ff7b00;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .slider-group {
      margin-bottom: 10px;
    }

    .review-card {
      background: white;
      color: black;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .rating-row {
      display: flex;
      justify-content: space-between;
    }

    .avg {
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🎵 Add Review</h2>

  <input id="song" placeholder="Song name">

  <div class="slider-group">
    <label>Lyrics</label>
    <input type="range" id="lyrics" min="0" max="10">
  </div>

  <div class="slider-group">
    <label>Vocals</label>
    <input type="range" id="vocals" min="0" max="10">
  </div>

  <div class="slider-group">
    <label>Composition</label>
    <input type="range" id="composition" min="0" max="10">
  </div>

  <div class="slider-group">
    <label>Melody</label>
    <input type="range" id="melody" min="0" max="10">
  </div>

  <div class="slider-group">
    <label>Music</label>
    <input type="range" id="music" min="0" max="10">
  </div>

  <button onclick="submitReview()">Submit</button>

  <h2>Latest Reviews</h2>
  <button onclick="getReviews()">Load Reviews</button>

  <div id="reviews"></div>

</div>

<script>
const API = "https://webapp.salonibb.in";

async function submitReview() {
  const data = {
    songName: document.getElementById("song").value,
    lyrics: +document.getElementById("lyrics").value,
    vocals: +document.getElementById("vocals").value,
    composition: +document.getElementById("composition").value,
    melody: +document.getElementById("melody").value,
    music: +document.getElementById("music").value
  };

  try {
    const res = await fetch(API + "/reviews", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error("Failed to submit review");

    alert("✅ Review added!");
  } catch (err) {
    alert("Error: " + err.message);
  }
}

async function getReviews() {
  try {
    const res = await fetch(API + "/reviews");

    if (!res.ok) throw new Error("Failed to fetch reviews");

    const data = await res.json();

    const container = document.getElementById("reviews");
    container.innerHTML = "";

    data.forEach(r => {
      container.innerHTML += `
        <div class="review-card">
          <h3>${r.songName}</h3>

          <div class="rating-row">
            <span>Lyrics: ${r.lyrics}</span>
            <span>Vocals: ${r.vocals}</span>
          </div>

          <div class="rating-row">
            <span>Composition: ${r.composition}</span>
            <span>Melody: ${r.melody}</span>
          </div>

          <div class="rating-row">
            <span>Music: ${r.music}</span>
            <span class="avg">⭐ ${r.average}</span>
          </div>

          <small>${new Date(r.createdAt).toLocaleString()}</small>
        </div>
      `;
    });

  } catch (err) {
    document.getElementById("reviews").innerText =
      "Error: " + err.message;
  }
}
</script>

</body>
</html>
